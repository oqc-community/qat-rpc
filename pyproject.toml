[project]
name = "qat-rpc"
version = "0.6.0"
description = "RPC tooling for OQC QAT."
authors = [
    { name = "Kajsa Eriksson Rosenqvist", email = "keriksson.rosenqvist@oqc.tech" },
    { name = "Kyle Hutchings", email = "khutchings@oqc.tech" },
]
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.10,<3.13"
dependencies = [
    "pydantic>=2.9.0,<3.0.0",
    "prometheus-client>=0.20.0",
    "pyzmq>=26.1.0",
    "qat-compiler>=3.0.0,<4.0.0",
]

[project.scripts]
qat_comexe = "qat_rpc.zmq.qat_commands:qat_run"

[tool.poetry]
packages = [
    { include = "qat_rpc", from = "src/" }
]

[tool.poetry.group.dev.dependencies]
coverage = "^6.3.2"
pytest-cov = "~=2.10.1"
autoflake = "^2.2.0"
isort = "^5.13.2"
black = "24.3.0"
pre-commit = "^3.2.0"
pip-audit = "^2.4.5"
pip-licenses = "^5.0.0"

[tool.autoflake]
remove-all-unused-imports = true
ignore-init-module-imports = true
ignore-pass-after-docstring = true
in-place = true
recursive = true

[tool.isort]
py_version = 39
profile = "black"
line_length = 92
known_first_party = ["qat_rpc"]

[tool.black]
line-length = 92
target-version = ["py310", "py311", "py312"]

[tool.pip-licenses]
ignore-packages = [
  "docutils",
  "psycopg2",
  "qat-rpc"
]
fail-on = "GNU General Public License (GPL);GNU Library or Lesser General Public License (LGPL)"

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"
